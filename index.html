<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Tip calculator app</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <section>
      <img src="./images/logo.svg" alt="logo">
      <!-- <h2>Splitter</h2> -->
      <div class="tips">
        <div class="tips__form">
          <form action="#" class="form" id="form" novalidate>
            <div class="input__bill">
              <label for="tipsBill">Bill</label>
              <input
                type="text"
                name="tipsBill"
                id="tipsBill"
                inputmode="numeric"
                placeholder="0"
                required
              />
            </div>
            <p class="buttons__text">Select Tip %</p>
            <div class="buttons__line">
              <button class="btn">5%</button>
              <button class="btn">10%</button>
              <button class="btn">15%</button>
              <button class="btn">25%</button>
              <button class="btn">50%</button>
              <input
                type="text"
                name="custom"
                id="custom"
                inputmode="numeric"
                placeholder="Custom"
                required
              />
            </div>
            <div class="input__person">
              <label for="tipsPerson">Number of People</label>
              <small class="error">Can't be zero</small>
              <input
                type="text"
                name="tipsPerson"
                id="tipsPerson"
                inputmode="numeric"
                placeholder="0"
              />
            </div>
          </form>
        </div>
        <div class="tips__number">
          <div class="tips__number-sum">
            <div class="tips__number-amount">
              <p class="tips__number-text">Tip Amount <span>/ person</span></p>
              <p class="amount-price"><span>&#36;</span>0.00</p>
            </div>
            <div class="tips__number-total">
              <p class="tips__number-text">Total<span>/ person</span></p>
              <p class="total-price"><span>&#36;</span>0.00</p>
            </div>
          </div>
          <buttons class="reset">Reset</buttons>
        </div>
      </div>
    </section>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Sasha Yerokhov</a>.
    </footer>
    <script src="app.js"></script>
  </body>
</html>
